name: Terraform Deploy to EKS

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - 'src/**'
      - '.github/workflows/terraform-deploy.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to perform'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy
          - plan

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.9.0
  KUBECTL_VERSION: 1.28.0

jobs:
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Run Configuration Validator
        run: |
          chmod +x validate-terraform-config.sh
          ./validate-terraform-config.sh

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request' || github.event.inputs.action == 'plan'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan -out=tfplan
          terraform show -no-color tfplan > plan.txt

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/plan.txt
          retention-days: 5

      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan.txt', 'utf8');
            const output = `#### Terraform Plan 📖
            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${plan}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: validate
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event.inputs.action == 'apply'
    environment:
      name: production
      url: ${{ steps.get-urls.outputs.app_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v${{ env.KUBECTL_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -out=tfplan

      - name: Terraform Apply - VPC
        working-directory: terraform
        run: |
          echo "🌐 Creating VPC and networking..."
          terraform apply -target=module.vpc -auto-approve

      - name: Terraform Apply - EKS Cluster
        working-directory: terraform
        run: |
          echo "☸️ Creating EKS cluster..."
          terraform apply -target=module.retail_app_eks -auto-approve

      - name: Configure kubectl
        working-directory: terraform
        run: |
          CLUSTER_NAME=$(terraform output -raw cluster_name)
          echo "Configuring kubectl for cluster: $CLUSTER_NAME"
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name $CLUSTER_NAME
          kubectl cluster-info
          kubectl get nodes

      - name: Terraform Apply - Complete
        working-directory: terraform
        run: |
          echo "🚀 Deploying add-ons and applications..."
          terraform apply -auto-approve

      - name: Wait for Services
        run: |
          echo "⏳ Waiting for services to be ready..."
          sleep 180

      - name: Verify Deployment
        run: |
          echo "🔍 Verifying deployment..."
          kubectl get namespaces
          kubectl get pods -A
          kubectl get svc -A | grep LoadBalancer

      - name: Get Service URLs
        id: get-urls
        working-directory: terraform
        run: |
          echo "📊 Getting service URLs..."
          
          # Application URL
          APP_URL=$(kubectl get svc ingress-nginx-controller -n ingress-nginx -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "pending")
          echo "app_url=http://$APP_URL" >> $GITHUB_OUTPUT
          
          # Grafana URL
          GRAFANA_URL=$(kubectl get svc kube-prometheus-stack-grafana -n monitoring -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "pending")
          echo "grafana_url=http://$GRAFANA_URL" >> $GITHUB_OUTPUT
          
          # Prometheus URL
          PROMETHEUS_URL=$(kubectl get svc kube-prometheus-stack-prometheus -n monitoring -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "pending")
          echo "prometheus_url=http://$PROMETHEUS_URL:9090" >> $GITHUB_OUTPUT
          
          # ArgoCD URL
          ARGOCD_URL=$(kubectl get svc argocd-server -n argocd -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "pending")
          echo "argocd_url=https://$ARGOCD_URL" >> $GITHUB_OUTPUT
          
          echo "✅ Deployment complete!"
          echo ""
          echo "📍 Access URLs:"
          echo "Application: http://$APP_URL"
          echo "Grafana: http://$GRAFANA_URL (admin/admin123)"
          echo "Prometheus: http://$PROMETHEUS_URL:9090"
          echo "ArgoCD: https://$ARGOCD_URL"

      - name: Create Deployment Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 🚀 Deployment Successful

          ### 📍 Service URLs

          | Service | URL | Credentials |
          |---------|-----|-------------|
          | Application | ${{ steps.get-urls.outputs.app_url }} | N/A |
          | Grafana | ${{ steps.get-urls.outputs.grafana_url }} | admin/admin123 |
          | Prometheus | ${{ steps.get-urls.outputs.prometheus_url }} | N/A |
          | ArgoCD | ${{ steps.get-urls.outputs.argocd_url }} | Get password: `kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' \| base64 -d` |

          ### ✅ Deployed Components

          - ✅ VPC and Networking
          - ✅ EKS Cluster (v1.33)
          - ✅ NGINX Ingress Controller
          - ✅ ArgoCD
          - ✅ Cert-manager
          - ✅ Monitoring Stack (Prometheus, Grafana, Alertmanager)
          - ✅ Retail Store Applications

          ### 📊 Cluster Information

          - **Region:** us-east-1
          - **Cluster:** $(cd terraform && terraform output -raw cluster_name)
          - **Deployed by:** @${{ github.actor }}
          - **Commit:** ${{ github.sha }}
          EOF

      - name: Notify Slack (Optional)
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Deployment ${{ job.status }}
            Application: ${{ steps.get-urls.outputs.app_url }}
            Grafana: ${{ steps.get-urls.outputs.grafana_url }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

  destroy:
    name: Destroy Infrastructure
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'destroy'
    environment:
      name: production-destroy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v${{ env.KUBECTL_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Configure kubectl
        working-directory: terraform
        run: |
          CLUSTER_NAME=$(terraform output -raw cluster_name 2>/dev/null || echo "")
          if [ -n "$CLUSTER_NAME" ]; then
            aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name $CLUSTER_NAME || true
          fi

      - name: Pre-Destroy Cleanup
        run: |
          echo "🧹 Cleaning up resources..."
          
          # Delete ArgoCD applications
          kubectl delete applications --all -n argocd --timeout=60s 2>/dev/null || true
          
          # Delete LoadBalancer services
          kubectl delete svc --all-namespaces --field-selector spec.type=LoadBalancer --timeout=60s 2>/dev/null || true
          
          echo "Waiting 30 seconds for AWS cleanup..."
          sleep 30

      - name: Terraform Destroy
        working-directory: terraform
        run: |
          echo "🗑️ Destroying infrastructure..."
          terraform destroy -auto-approve

      - name: Create Destroy Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 🗑️ Infrastructure Destroyed

          All resources have been successfully destroyed.

          - ✅ Applications deleted
          - ✅ LoadBalancers removed
          - ✅ EKS Cluster destroyed
          - ✅ VPC and networking removed

          **Destroyed by:** @${{ github.actor }}
          **Commit:** ${{ github.sha }}
          EOF
